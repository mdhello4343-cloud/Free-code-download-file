    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBQ8DkVDx4DCrEVLN3LFTnEER0YLa1UqIQ",
            authDomain: "free-download-code-2cf68.firebaseapp.com",
            databaseURL: "https://free-download-code-2cf68-default-rtdb.firebaseio.com",
            projectId: "free-download-code-2cf68",
            storageBucket: "free-download-code-2cf68.firebasestorage.app",
            messagingSenderId: "632394494942",
            appId: "1:632394494942:web:8bde8ba728c6b7e748a34f"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp; tg.expand();

        let sMethod = '', waitSec = 10, payInfo = {};

        // Profile Integration
        const user = tg.initDataUnsafe.user;
        if(user) {
            const name = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            document.getElementById('header-name').textContent = name;
            document.getElementById('profile-name').textContent = name;
            document.getElementById('profile-id').textContent = "ID: " + user.id;
            if(user.photo_url) {
                document.getElementById('header-photo').src = user.photo_url;
                document.getElementById('profile-photo').src = user.photo_url;
            }
        }

        async function init() {
            // Load Payment Info
            const pSnap = await getDoc(doc(db, "settings", "payment"));
            if (pSnap.exists()) payInfo = pSnap.data();

            // Load Ads & Settings
            const adsSnap = await getDoc(doc(db, "settings", "ads"));
            if (adsSnap.exists()) {
                const d = adsSnap.data();
                renderAd('ad-container-1', d.adSlot1);
                renderAd('ad-container-2', d.adSlot2);
            }
            const setSnap = await getDoc(doc(db, "settings", "general"));
            if (setSnap.exists()) waitSec = setSnap.data().timerDuration || 10;
            
            // --- LOAD SLIDERS (BANNERS) ---
            const sSnap = await getDocs(query(collection(db, "sliders"), orderBy("createdAt", "desc")));
            const sWrap = document.getElementById('slider-wrap');
            sWrap.innerHTML = '';
            sSnap.forEach(d => {
                sWrap.innerHTML += `<div class="min-w-full h-full"><img src="${d.data().imageUrl}" class="w-full h-full object-cover"></div>`;
            });
            if(sSnap.size > 1) {
                let idx = 0; setInterval(() => { idx = (idx+1)%sSnap.size; sWrap.style.transform = `translateX(-${idx*100}%)`; }, 4000);
            }

            // --- LOAD FILES ---
            const fSnap = await getDocs(query(collection(db, "files"), orderBy("createdAt", "desc")));
            const fGrid = document.getElementById('free-grid'), pGrid = document.getElementById('premium-grid');
            fGrid.innerHTML = ''; pGrid.innerHTML = '';

            fSnap.forEach(d => {
                const f = d.data();
                const isPaid = f.price > 0;
                // BIG FAKE STATS
                const v = (Math.floor(Math.random() * (90 - 15) + 15)).toFixed(1) + "K";
                const dl = (Math.floor(Math.random() * (25 - 5) + 5)).toFixed(1) + "K";

                const card = `
                    <div class="bg-white dark:bg-darkCard rounded-[2rem] p-3 shadow-sm border dark:border-slate-800 transition-all active:scale-95">
                        <div class="relative mb-3">
                            <img src="${f.thumbnailUrl}" class="w-full h-28 object-cover rounded-3xl">
                            <span class="absolute top-2 left-2 ${isPaid ? 'bg-orange-500' : 'bg-blue-600'} text-white text-[7px] font-black px-2 py-0.5 rounded-full uppercase shadow-lg">${isPaid ? 'Paid' : 'Free'}</span>
                        </div>
                        <div class="flex justify-between items-center gap-1">
                            <h3 class="font-bold text-[9px] truncate uppercase flex-1">${f.title}</h3>
                            <button onclick="shareCode('${f.title}')" class="text-blue-500 text-[10px]"><i class="fas fa-share-alt"></i></button>
                        </div>
                        <div class="flex justify-between text-[7px] opacity-40 font-black mt-1 mb-3 uppercase">
                            <span><i class="fas fa-eye"></i> ${v}</span>
                            <span><i class="fas fa-download"></i> ${dl}</span>
                        </div>
                        <button onclick="handleAction(this)" data-id="${d.id}" data-url="${f.downloadUrl}" data-req="${f.requiredAds}" data-price="${f.price}"
                            class="w-full py-2.5 rounded-2xl text-[9px] font-black ${isPaid ? 'bg-orange-500 shadow-orange-500/20' : 'bg-slate-900 dark:bg-blue-600 shadow-blue-500/20'} text-white shadow-lg">
                            ${isPaid ? 'BUY: '+f.price+'TK' : 'GET FREE'}
                        </button>
                    </div>`;
                if(isPaid) pGrid.innerHTML += card; else fGrid.innerHTML += card;
            });
        }

        // Actions
        window.selectPay = (m, btn) => {
            sMethod = m;
            document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('border-blue-500', 'bg-blue-50', 'dark:bg-blue-900/10'));
            btn.classList.add('border-blue-500', 'bg-blue-50', 'dark:bg-blue-900/10');
            const num = m === 'Bkash' ? payInfo.bkash : payInfo.nagad;
            document.getElementById('pay-number-display').innerHTML = `Send Money To (${m}): <span class="text-blue-500 font-black tracking-widest ml-1">${num || 'Not Set'}</span>`;
            document.getElementById('pay-box').classList.remove('hidden');
        };

        window.submitDep = () => {
            const s = document.getElementById('dep-sender').value, tx = document.getElementById('dep-txid').value, am = document.getElementById('dep-amount').value;
            if(!sMethod || !s || !tx || !am) return alert("Please fill all details!");
            const msg = `--- NEW DEPOSIT REQUEST ---\nMethod: ${sMethod}\nAmount: ${am} TK\nSender: ${s}\nTxID: ${tx}\nUser: ${user ? '@'+user.username : 'Guest'}\nDate: ${new Date().toLocaleString()}`;
            window.open(`https://t.me/SHOPBASE_BD?text=${encodeURIComponent(msg)}`, '_blank');
        };

        window.shareCode = (title) => {
            const text = `Hey! Check out this awesome script: ${title} 🚀 Download it now for free on DOWNLOAD FREE CODE!`;
            if (navigator.share) navigator.share({ title: 'DF CODE', text: text, url: window.location.href });
            else window.open(`https://t.me/share/url?url=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent(text)}`);
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-tab'));
            document.querySelectorAll('nav button').forEach(b => b.classList.add('opacity-30'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('text-blue-600'));
            document.getElementById(tab+'-tab').classList.add('active-tab');
            document.getElementById('nav-'+tab).classList.remove('opacity-30');
            document.getElementById('nav-'+tab).classList.add('text-blue-600');
        };

        window.handleAction = async (btn) => {
            if(parseInt(btn.dataset.price) > 0) return switchTab('deposit');
            const id = btn.dataset.id, req = parseInt(btn.dataset.req);
            let c = parseInt(localStorage.getItem('c_'+id) || 0);
            if(c >= req) return window.open(btn.dataset.url, '_blank');
            btn.disabled = true; btn.innerHTML = "LOADING...";
            try {
                await show_9506873(); c++; localStorage.setItem('c_'+id, c);
                if(c >= req) { btn.innerHTML = "DOWNLOAD"; btn.disabled = false; }
                else {
                    let s = waitSec; const itv = setInterval(() => { btn.innerHTML = "WAIT "+s+"S"; if(s-- <= 0) { clearInterval(itv); btn.innerHTML = `UNLOCK (${c}/${req})`; btn.disabled = false; } }, 1000);
                }
            } catch { btn.disabled = false; }
        };

        function renderAd(id, code) {
            const c = document.getElementById(id); if(!c || !code) return;
            c.innerHTML = code;
            Array.from(c.getElementsByTagName('script')).forEach(s => {
                const n = document.createElement('script');
                Array.from(s.attributes).forEach(a => n.setAttribute(a.name, a.value));
                n.innerHTML = s.innerHTML; s.parentNode.replaceChild(n, s);
            });
        }

        document.getElementById('themeToggle').onclick = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        };

        init();
    </script>
</body>
