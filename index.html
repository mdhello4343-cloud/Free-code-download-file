<!DOCTYPE html>
<html lang="en" class="light">

    <script src="https://cdn.tailwindcss.com"></script>

        body::-webkit-scrollbar { display: none; }
        .slider-wrapper { display: flex; transition: transform 0.5s ease-in-out; }
        .slider-item { min-width: 100%; height: 100%; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { display: inline-block; white-space: nowrap; animation: marquee 15s linear infinite; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-darkBg text-gray-900 dark:text-gray-100 font-sans min-h-screen">

    <!-- Back to Top (Feature 59) -->
    <button id="backToTop" class="fixed bottom-6 right-6 z-[100] bg-blue-600 text-white w-12 h-12 rounded-full shadow-2xl hidden items-center justify-center transition-all hover:scale-110">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- Top Notice Bar -->
    <div class="bg-blue-600 dark:bg-blue-800 text-white text-[10px] py-1.5 overflow-hidden font-bold">
        <div class="animate-marquee">
            🔥 Welcome to DOWNLOAD FREE CODE | Premium Scripts & Code Hub | Join Telegram for Instant Help! 🔥
        </div>
    </div>

    <!-- Header (Feature 1 & 54) -->
    <header class="bg-white dark:bg-darkCard shadow-sm border-b dark:border-gray-800 sticky top-0 z-50 px-4 py-3 flex justify-between items-center">
        <h1 class="text-xl font-black text-blue-600 dark:text-blue-400">DOWNLOAD FREE CODE</h1>
        <div class="flex items-center gap-4">
            <button id="themeToggle" class="text-gray-600 dark:text-gray-300"><i class="fas fa-moon text-xl dark:fa-sun"></i></button>
            <a href="https://t.me/your_telegram" class="text-blue-500"><i class="fab fa-telegram text-2xl"></i></a>
        </div>
    </header>

    <main class="w-full max-w-md mx-auto px-3 pb-20">
        
        <!-- Premium Slider -->
        <div class="relative w-full h-48 bg-gray-200 dark:bg-gray-800 rounded-3xl overflow-hidden my-4 shadow-xl">
            <div id="slider-wrap" class="slider-wrapper h-full"></div>
            <div id="slider-dots" class="absolute bottom-3 left-1/2 -translate-x-1/2 flex gap-2"></div>
        </div>

        <!-- Ad Slot -->
        <div id="ad-container-1" class="my-4 flex justify-center min-h-[50px]"></div>

        <div class="flex items-center justify-between mb-4 px-1">
            <h2 class="text-lg font-bold">Recommended Files</h2>
            <i class="fas fa-certificate text-blue-500"></i>
        </div>

        <!-- Vertical List View (Feature 54) -->
        <div id="files-grid" class="space-y-4">
            <!-- Skeleton Loading -->
            <div class="h-32 bg-white dark:bg-darkCard rounded-3xl animate-pulse"></div>
            <div class="h-32 bg-white dark:bg-darkCard rounded-3xl animate-pulse"></div>
        </div>
    </main>

    <!-- Script Block -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBQ8DkVDx4DCrEVLN3LFTnEER0YLa1UqIQ",
            authDomain: "free-download-code-2cf68.firebaseapp.com",
            databaseURL: "https://free-download-code-2cf68-default-rtdb.firebaseio.com",
            projectId: "free-download-code-2cf68",
            storageBucket: "free-download-code-2cf68.firebasestorage.app",
            messagingSenderId: "632394494942",
            appId: "1:632394494942:web:8bde8ba728c6b7e748a34f"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const TELEGRAM_LINK = "https://t.me/your_telegram";
        let waitTime = 10;

        // --- Feature 1: Dark Mode Logic ---
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        themeToggle.onclick = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        };

        // --- Feature 59: Back to Top ---
        const btt = document.getElementById('backToTop');
        window.onscroll = () => {
            if (window.scrollY > 300) btt.style.display = 'flex';
            else btt.style.display = 'none';
        };
        btt.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });

        async function init() {
            const setSnap = await getDoc(doc(db, "settings", "general"));
            if (setSnap.exists()) waitTime = setSnap.data().timerDuration || 10;

            const sSnap = await getDocs(query(collection(db, "sliders"), orderBy("createdAt", "desc")));
            const sWrap = document.getElementById('slider-wrap');
            sSnap.forEach(d => {
                sWrap.innerHTML += `<div class="slider-item"><img src="${d.data().imageUrl}" class="w-full h-full object-cover"></div>`;
            });
            if(sSnap.size > 1) {
                let idx = 0;
                setInterval(() => {
                    idx = (idx + 1) % sSnap.size;
                    sWrap.style.transform = `translateX(-${idx * 100}%)`;
                }, 4000);
            }

            const fSnap = await getDocs(query(collection(db, "files"), orderBy("createdAt", "desc")));
            const grid = document.getElementById('files-grid');
            grid.innerHTML = '';

            fSnap.forEach(d => {
                const f = d.data();
                const isPaid = f.requiredAds === 0;
                
                // --- Feature 14: Fake Views ---
                const views = (Math.random() * (12.5 - 1.2) + 1.2).toFixed(1) + "k";
                
                const card = document.createElement('div');
                card.className = "bg-white dark:bg-darkCard rounded-3xl p-4 shadow-sm border border-transparent dark:border-gray-800";
                card.innerHTML = `
                    <div class="flex gap-4">
                        <div class="relative w-24 h-24 flex-shrink-0">
                            <img src="${f.thumbnailUrl}" class="w-full h-full object-cover rounded-2xl">
                            <span class="absolute -top-2 -left-2 ${isPaid ? 'bg-amber-500' : 'bg-blue-600'} text-white text-[8px] font-black px-2 py-0.5 rounded-full uppercase">
                                ${isPaid ? 'Premium' : 'Free'}
                            </span>
                        </div>
                        <div class="flex-1 overflow-hidden">
                            <h3 class="font-bold text-gray-900 dark:text-white text-sm truncate flex items-center gap-1">
                                ${f.title}
                                <i class="fas fa-check-circle text-blue-500 text-[10px]"></i> <!-- Feature 65: Verification Badge -->
                            </h3>
                            <div class="flex items-center gap-3 text-[10px] opacity-50 mt-1">
                                <span><i class="far fa-eye mr-1"></i>${views} Views</span>
                                <span><i class="fas fa-shield-alt mr-1"></i>Verified</span>
                            </div>
                            <!-- Feature 37: ZIP Content Preview Simulator -->
                            <div class="mt-2 flex gap-1 opacity-40 text-[9px] font-mono">
                                <span class="bg-gray-100 dark:bg-gray-800 px-1 rounded">index.js</span>
                                <span class="bg-gray-100 dark:bg-gray-800 px-1 rounded">config.json</span>
                                <span class="bg-gray-100 dark:bg-gray-800 px-1 rounded">+3 files</span>
                            </div>
                        </div>
                    </div>
                    
                    <button onclick="handleBtn(this)" 
                        data-id="${d.id}" data-url="${f.downloadUrl}" data-req="${f.requiredAds}" data-paid="${isPaid}"
                        class="w-full mt-4 py-3 rounded-2xl text-xs font-black transition-all flex items-center justify-center gap-2 shadow-lg
                        ${isPaid ? 'bg-gray-900 dark:bg-blue-700 text-white' : 'bg-blue-600 text-white'}">
                        <i class="${isPaid ? 'fas fa-shopping-cart' : 'fas fa-lock'}"></i>
                        <span>${isPaid ? 'PURCHASE CODE' : 'UNLOCK DOWNLOAD'}</span>
                    </button>
                `;
                grid.appendChild(card);
                if(!isPaid) updateBtn(card.querySelector('button'));
            });
        }

        window.handleBtn = async (btn) => {
            if (btn.dataset.paid === "true") {
                window.location.href = TELEGRAM_LINK;
                return;
            }
            const id = btn.dataset.id;
            const req = parseInt(btn.dataset.req);
            let count = parseInt(localStorage.getItem(`count_${id}`) || 0);

            if (count >= req) {
                window.open(btn.dataset.url, '_blank');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Preparing Ad...`;
            try {
                await show_9745051();
                count++;
                localStorage.setItem(`count_${id}`, count);
                if (count >= req) {
                    updateBtn(btn);
                    btn.disabled = false;
                } else {
                    let s = waitTime;
                    const timer = setInterval(() => {
                        btn.innerHTML = `<i class="fas fa-clock"></i> Wait ${s}s`;
                        if (s-- <= 0) {
                            clearInterval(timer);
                            updateBtn(btn);
                            btn.disabled = false;
                        }
                    }, 1000);
                }
            } catch { btn.disabled = false; updateBtn(btn); }
        };

        function updateBtn(btn) {
            const id = btn.dataset.id;
            const req = btn.dataset.req;
            const count = localStorage.getItem(`count_${id}`) || 0;
            const ok = count >= req;
            btn.querySelector('span').textContent = ok ? "DOWNLOAD NOW" : `UNLOCK (${count}/${req})`;
            btn.querySelector('i').className = ok ? "fas fa-cloud-download-alt" : "fas fa-lock";
            if(ok) btn.classList.replace('bg-blue-600', 'bg-green-600');
        }

        init();
    </script>
</body>
</html>
